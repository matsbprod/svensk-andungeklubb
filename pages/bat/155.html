  <style>
    #logo-block { position:fixed;z-index:200;left:clamp(1.5rem,5vw,6rem);display:flex;flex-direction:column;align-items:center;pointer-events:none; }
    .logo-line { display:block;font-family:"Cinzel",Georgia,serif;font-weight:400;text-transform:uppercase;line-height:1.08;white-space:nowrap;color:#f0f4f6; }
    #duck-img { position:fixed;z-index:300;pointer-events:none;opacity:0;filter:brightness(0) invert(1); }
    .bat-hero { background:var(--card-dark);padding-top:100px;border-bottom:1px solid rgba(184,145,74,.15); }
    .bat-hero-inner { max-width:var(--max-w);margin:0 auto;padding:3rem var(--pad);display:grid;grid-template-columns:1fr auto;gap:3rem;align-items:start; }
    .bat-nr { font-family:sans-serif;font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--brass);margin-bottom:.5rem; }
    .bat-name { font-size:clamp(2.5rem,6vw,5rem);font-weight:300;color:var(--white);letter-spacing:.04em;line-height:1;margin-bottom:.4rem; }
    .bat-owner { font-size:1.3rem;font-weight:300;color:var(--white-dim);font-style:italic; }
    .bat-meta { background:var(--card);padding:1.8rem 2rem;min-width:220px; }
    .bat-meta-row { margin-bottom:.9rem;padding-bottom:.9rem;border-bottom:1px solid rgba(255,255,255,.06); }
    .bat-meta-row:last-child { border:none;margin:0;padding:0; }
    .bat-meta-label { font-family:sans-serif;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--brass);margin-bottom:.2rem; }
    .bat-meta-value { font-size:1rem;color:var(--white); }
    .bat-body { max-width:var(--max-w);margin:0 auto;padding:4rem var(--pad); }
    .bat-description p { font-size:1.15rem;font-weight:300;color:var(--white);line-height:1.9;max-width:720px;margin-bottom:1.2rem; }
    .bat-prev { margin:3rem 0; }
    .bat-prev h3 { font-family:sans-serif;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--brass);margin-bottom:1rem; }
    .bat-photos { display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;margin:3rem 0; }
    .bat-photo { cursor:zoom-in;overflow:hidden; }
    .bat-photo img { width:100%;aspect-ratio:4/3;object-fit:cover;display:block;transition:transform .5s ease; }
    .bat-photo:hover img { transform:scale(1.04); }
    .bat-back { display:inline-flex;align-items:center;gap:.5rem;font-family:sans-serif;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--brass);margin-bottom:2rem;border-bottom:1px solid rgba(184,145,74,.3);padding-bottom:2px;text-decoration:none; }
    #lightbox { display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;flex-direction:column; }
    #lightbox.open { display:flex; }
    #lightbox img { max-width:90vw;max-height:82vh;object-fit:contain; }
    #lightbox-caption { margin-top:.8rem;font-family:sans-serif;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.5); }
    #lb-close { position:absolute;top:1.5rem;right:2rem;font-size:2.5rem;color:rgba(255,255,255,.5);cursor:pointer;line-height:1; }
    #lb-close:hover { color:#fff; }
    #lb-prev, #lb-next { position:absolute;top:50%;transform:translateY(-50%);font-size:2rem;color:rgba(255,255,255,.4);cursor:pointer;padding:1rem; }
    #lb-prev { left:1rem; } #lb-next { right:1rem; }
    #lb-prev:hover, #lb-next:hover { color:#fff; }
    @media(max-width:700px) { .bat-hero-inner { grid-template-columns:1fr; } }
  </style>

<div id="lightbox">
  <span id="lb-close">&times;</span>
  <span id="lb-prev">&#8592;</span>
  <img id="lb-img" src="" alt="">
  <p id="lightbox-caption"></p>
  <span id="lb-next">&#8594;</span>
</div>

<script src="../../js/duck.js"></script>
<script src="../../js/header-static.js"></script>
<script>
(function(){
  var photos=Array.from(document.querySelectorAll('.bat-photo'));
  var lb=document.getElementById('lightbox');
  var lbImg=document.getElementById('lb-img');
  var cur=0;
  function show(i){cur=(i+photos.length)%photos.length;lbImg.src=photos[cur].querySelector('img').src;lb.classList.add('open');}
  photos.forEach(function(p,i){p.addEventListener('click',function(){show(i);});});
  document.getElementById('lb-close').onclick=function(){lb.classList.remove('open');};
  document.getElementById('lb-prev').onclick=function(){show(cur-1);};
  document.getElementById('lb-next').onclick=function(){show(cur+1);};
  lb.addEventListener('click',function(e){if(e.target===lb)lb.classList.remove('open');});
  document.addEventListener('keydown',function(e){if(!lb.classList.contains('open'))return;if(e.key==='Escape')lb.classList.remove('open');if(e.key==='ArrowLeft')show(cur-1);if(e.key==='ArrowRight')show(cur+1);});
})();
</script>
