<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lagersaldo — Andungeklubb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a121a;
      --navy2: #0e1c28;
      --card: #111e2b;
      --card2: #162234;
      --brass: #b8914a;
      --brass-dim: rgba(184,145,74,.3);
      --white: #f0f4f6;
      --white-dim: rgba(240,244,246,.55);
      --green: #4caf7d;
      --yellow: #e8c84a;
      --red: #e05555;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2rem;
    }
    .login-logo {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      letter-spacing: .25em;
      color: var(--brass);
      text-align: center;
      line-height: 1.8;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--brass-dim);
      padding: 2.5rem 3rem;
      display: flex; flex-direction: column; gap: 1.2rem;
      min-width: 300px;
    }
    .login-box label {
      font-family: sans-serif;
      font-size: .65rem; letter-spacing: .18em;
      text-transform: uppercase; color: var(--brass);
    }
    .login-box input {
      background: transparent;
      border: 1px solid var(--brass-dim);
      color: var(--white);
      padding: .7rem 1rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; outline: none; width: 100%;
      transition: border-color .2s;
    }
    .login-box input:focus { border-color: var(--brass); }
    .login-error {
      font-size: .85rem; color: var(--red);
      font-style: italic; min-height: 1.2em;
    }
    .btn-login {
      background: var(--brass);
      color: var(--navy);
      border: none; cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: .75rem; letter-spacing: .18em;
      text-transform: uppercase;
      padding: .85rem 2rem;
      transition: background .2s;
    }
    .btn-login:hover { background: #d4a85a; }

    /* ── APP ── */
    #app { display: none; }

    header {
      background: var(--navy2);
      border-bottom: 1px solid var(--brass-dim);
      padding: 1.2rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .header-title {
      font-family: 'Cinzel', serif;
      font-size: .85rem; letter-spacing: .2em;
      color: var(--brass); text-transform: uppercase;
    }
    .header-meta {
      font-size: .8rem; color: var(--white-dim);
      font-style: italic;
    }
    .btn-logout {
      background: none; border: 1px solid var(--brass-dim);
      color: var(--white-dim); cursor: pointer;
      font-family: sans-serif; font-size: .6rem;
      letter-spacing: .14em; text-transform: uppercase;
      padding: .4rem .9rem; transition: all .2s;
    }
    .btn-logout:hover { border-color: var(--brass); color: var(--white); }

    main { max-width: 900px; margin: 0 auto; padding: 3rem 2rem; }

    /* ── SUMMARY BAR ── */
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem; margin-bottom: 3rem;
    }
    .summary-card {
      background: var(--card);
      border: 1px solid var(--brass-dim);
      padding: 1.2rem 1.5rem;
      text-align: center;
    }
    .summary-num {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem; color: var(--brass);
      line-height: 1;
    }
    .summary-label {
      font-family: sans-serif; font-size: .6rem;
      letter-spacing: .16em; text-transform: uppercase;
      color: var(--white-dim); margin-top: .4rem;
    }

    /* ── TABLE ── */
    .section-title {
      font-family: 'Cinzel', serif;
      font-size: .75rem; letter-spacing: .2em;
      text-transform: uppercase; color: var(--brass);
      margin-bottom: 1.2rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .section-title::after {
      content: ''; flex: 1;
      height: 1px; background: var(--brass-dim);
    }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-family: sans-serif; font-size: .62rem;
      letter-spacing: .16em; text-transform: uppercase;
      color: var(--brass); padding: .8rem 1rem;
      border-bottom: 1px solid var(--brass-dim);
      text-align: left; white-space: nowrap;
    }
    thead th:last-child { text-align: center; width: 160px; }
    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,.05);
      transition: background .15s;
    }
    tbody tr:hover { background: rgba(255,255,255,.02); }
    td { padding: .9rem 1rem; vertical-align: middle; }
    .td-name { font-size: 1.1rem; color: var(--white); }
    .td-price { font-size: .9rem; color: var(--white-dim); }
    .td-stock { text-align: center; }

    /* Stock badge */
    .stock-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 2.4rem; padding: .25rem .6rem;
      font-family: 'Cinzel', serif; font-size: 1rem;
      border-radius: 3px; font-weight: 600;
    }
    .stock-ok    { background: rgba(76,175,125,.15); color: var(--green); border: 1px solid rgba(76,175,125,.3); }
    .stock-low   { background: rgba(232,200,74,.12); color: var(--yellow); border: 1px solid rgba(232,200,74,.3); }
    .stock-empty { background: rgba(224,85,85,.12);  color: var(--red);   border: 1px solid rgba(224,85,85,.3); }

    /* Inline edit */
    .td-actions { text-align: center; }
    .stock-edit-wrap { display: flex; align-items: center; justify-content: center; gap: .5rem; }
    .btn-adj {
      background: none; border: 1px solid var(--brass-dim);
      color: var(--brass); cursor: pointer;
      width: 28px; height: 28px; border-radius: 3px;
      font-size: 1.1rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .btn-adj:hover { background: var(--brass-dim); border-color: var(--brass); }
    .stock-input {
      background: var(--card2); border: 1px solid var(--brass);
      color: var(--white); width: 52px; text-align: center;
      font-family: 'Cinzel', serif; font-size: 1rem;
      padding: .25rem; border-radius: 3px; outline: none;
    }
    .stock-input::-webkit-inner-spin-button { display: none; }

    /* Size rows */
    .size-row td { padding: .5rem 1rem .5rem 2.5rem; }
    .size-label {
      font-family: sans-serif; font-size: .65rem;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--white-dim);
    }

    /* Save indicator */
    #save-indicator {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--card); border: 1px solid var(--brass-dim);
      padding: .6rem 1.2rem;
      font-family: sans-serif; font-size: .65rem;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--brass); opacity: 0;
      transition: opacity .3s; pointer-events: none;
    }
    #save-indicator.show { opacity: 1; }

    /* Last updated */
    #last-updated {
      font-size: .8rem; color: var(--white-dim);
      font-style: italic; text-align: right;
      margin-top: 2rem;
    }

    @media (max-width: 600px) {
      .summary { grid-template-columns: 1fr 1fr; }
      main { padding: 2rem 1rem; }
      header { padding: 1rem; }
      thead th:nth-child(2) { display: none; }
      td:nth-child(2) { display: none; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-logo">
    SVENSK<br>ANDUNGEKLUBB<br>
    <span style="font-size:.6em;letter-spacing:.3em;color:var(--white-dim)">LAGERSALDO</span>
  </div>
  <div class="login-box">
    <label for="pw-input">Lösenord</label>
    <input type="password" id="pw-input" placeholder="••••••••" autocomplete="off">
    <div class="login-error" id="login-error"></div>
    <button class="btn-login" onclick="doLogin()">Logga in</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <header>
    <div class="header-title">Lagersaldo</div>
    <div class="header-meta" id="header-meta"></div>
    <button class="btn-logout" onclick="doLogout()">Logga ut</button>
  </header>

  <main>
    <div class="summary">
      <div class="summary-card">
        <div class="summary-num" id="sum-total">—</div>
        <div class="summary-label">Totalt i lager</div>
      </div>
      <div class="summary-card">
        <div class="summary-num" style="color:var(--yellow)" id="sum-low">—</div>
        <div class="summary-label">Lågt saldo (≤3)</div>
      </div>
      <div class="summary-card">
        <div class="summary-num" style="color:var(--red)" id="sum-empty">—</div>
        <div class="summary-label">Slut i lager</div>
      </div>
    </div>

    <div class="section-title">Produkter</div>

    <table id="stock-table">
      <thead>
        <tr>
          <th>Produkt</th>
          <th>Pris</th>
          <th>Saldo</th>
          <th>Justera</th>
        </tr>
      </thead>
      <tbody id="stock-body"></tbody>
    </table>

    <div id="last-updated"></div>
  </main>
</div>

<div id="save-indicator">Sparat ✓</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const PASSWORD = 'andunge';

// Products — sizes null = ingen storlek, array = storleksval
const PRODUCTS = [
  { id: 'keps-bla',     name: 'Keps, blå',               price: '210 kr', sizes: null },
  { id: 'keps-vit',     name: 'Keps, vit',               price: '210 kr', sizes: null },
  { id: 'pike-navy-ny', name: 'Piké Navy, ny version',   price: '475 kr', sizes: ['S','M','L','XL'] },
  { id: 'mossa',        name: 'Mössa, marinblå',         price: '175 kr', sizes: null },
  { id: 'pike-navy-ld', name: 'Piké Navy, äldre version',price: '100 kr', sizes: ['Dam S'] },
  { id: 'pike-vit-ld',  name: 'Piké Vit, äldre version', price: '100 kr', sizes: ['Herr S'] },
  { id: 'standert',     name: 'Standert',                price: '175 kr', sizes: null },
  { id: 'emblem',       name: 'Broderat emblem',         price: '80 kr',  sizes: null },
  { id: 'ritning',      name: 'Ritningsplansch Andunge', price: '190 kr', sizes: null },
  { id: 'pin-1',        name: 'Pin',                     price: '50 kr',  sizes: null },
  { id: 'pin-3',        name: 'Pins × 3',               price: '100 kr', sizes: null },
];

// ── STATE ───────────────────────────────────────────────────
let stock = {};  // { id: number } or { id_S: number, id_M: ... }
let lastUpdated = null;

// ── STORAGE — Netlify Blobs via API ─────────────────────────
function initKeys() {
  PRODUCTS.forEach(p => {
    if (p.sizes) {
      p.sizes.forEach(s => {
        const k = p.id + '_' + s;
        if (stock[k] === undefined) stock[k] = 0;
      });
    } else {
      if (stock[p.id] === undefined) stock[p.id] = 0;
    }
  });
}

async function loadStock() {
  try {
    const res = await fetch('/api/lager');
    if (res.ok) {
      const d = await res.json();
      stock = d.stock || {};
      lastUpdated = d.lastUpdated || null;
    }
  } catch(e) {}
  initKeys();
}

let saveTimer = null;
function saveStock() {
  lastUpdated = new Date().toISOString();
  updateSummary();
  updateLastUpdated();
  // Debounce — vänta 800ms efter sista ändringen innan sparning
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      const res = await fetch('/api/lager', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ stock, lastUpdated })
      });
      if (res.ok) showSaved();
    } catch(e) {
      console.error('Sparning misslyckades:', e);
    }
  }, 800);
}

function showSaved() {
  const el = document.getElementById('save-indicator');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1800);
}

// ── LOGIN ────────────────────────────────────────────────────
function doLogin() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadStock().then(() => { renderTable(); updateSummary(); updateLastUpdated(); });
    updateSummary();
    updateLastUpdated();
  } else {
    const err = document.getElementById('login-error');
    err.textContent = 'Fel lösenord.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
    setTimeout(() => err.textContent = '', 2500);
  }
}

function doLogout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── RENDER ───────────────────────────────────────────────────
function stockClass(n) {
  if (n === 0) return 'stock-empty';
  if (n <= 3)  return 'stock-low';
  return 'stock-ok';
}

function renderTable() {
  const tbody = document.getElementById('stock-body');
  tbody.innerHTML = '';

  PRODUCTS.forEach(p => {
    if (p.sizes) {
      // Header row (no edit, shows total)
      const total = p.sizes.reduce((s, sz) => s + (stock[p.id + '_' + sz] || 0), 0);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="td-name">${p.name}</td>
        <td class="td-price">${p.price}</td>
        <td class="td-stock"><span class="stock-badge ${stockClass(total)}">${total}</span></td>
        <td></td>`;
      tbody.appendChild(tr);
      // Size rows
      p.sizes.forEach(sz => {
        const k = p.id + '_' + sz;
        const n = stock[k] || 0;
        const sr = document.createElement('tr');
        sr.className = 'size-row';
        sr.innerHTML = `
          <td colspan="2"><span class="size-label">${sz}</span></td>
          <td class="td-stock">
            <span class="stock-badge ${stockClass(n)}" id="badge-${k}">${n}</span>
          </td>
          <td class="td-actions">
            <div class="stock-edit-wrap">
              <button class="btn-adj" onclick="adj('${k}',-1)">−</button>
              <input class="stock-input" type="number" min="0" id="inp-${k}" value="${n}"
                onchange="setStock('${k}', this.value)"
                onblur="setStock('${k}', this.value)">
              <button class="btn-adj" onclick="adj('${k}',1)">+</button>
            </div>
          </td>`;
        tbody.appendChild(sr);
      });
    } else {
      const n = stock[p.id] || 0;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="td-name">${p.name}</td>
        <td class="td-price">${p.price}</td>
        <td class="td-stock">
          <span class="stock-badge ${stockClass(n)}" id="badge-${p.id}">${n}</span>
        </td>
        <td class="td-actions">
          <div class="stock-edit-wrap">
            <button class="btn-adj" onclick="adj('${p.id}',-1)">−</button>
            <input class="stock-input" type="number" min="0" id="inp-${p.id}" value="${n}"
              onchange="setStock('${p.id}', this.value)"
              onblur="setStock('${p.id}', this.value)">
            <button class="btn-adj" onclick="adj('${p.id}',1)">+</button>
          </div>
        </td>`;
      tbody.appendChild(tr);
    }
  });
}

function adj(key, delta) {
  const n = Math.max(0, (stock[key] || 0) + delta);
  stock[key] = n;
  updateRow(key, n);
  saveStock();
}

function setStock(key, val) {
  const n = Math.max(0, parseInt(val) || 0);
  stock[key] = n;
  updateRow(key, n);
  saveStock();
}

function updateRow(key, n) {
  const badge = document.getElementById('badge-' + key);
  const inp   = document.getElementById('inp-' + key);
  if (badge) { badge.textContent = n; badge.className = 'stock-badge ' + stockClass(n); }
  if (inp)   { inp.value = n; }
  // Update parent total if size row
  PRODUCTS.forEach(p => {
    if (p.sizes && p.sizes.some(s => p.id + '_' + s === key)) {
      const total = p.sizes.reduce((s, sz) => s + (stock[p.id + '_' + sz] || 0), 0);
      // find parent badge — first badge in parent row
      const rows = document.getElementById('stock-body').querySelectorAll('tr');
      rows.forEach(tr => {
        if (!tr.classList.contains('size-row')) {
          const nm = tr.querySelector('.td-name');
          if (nm && nm.textContent === p.name) {
            const b = tr.querySelector('.stock-badge');
            if (b) { b.textContent = total; b.className = 'stock-badge ' + stockClass(total); }
          }
        }
      });
    }
  });
}

function updateSummary() {
  let total = 0, low = 0, empty = 0;
  Object.values(stock).forEach(n => {
    total += n;
    if (n === 0) empty++;
    else if (n <= 3) low++;
  });
  document.getElementById('sum-total').textContent = total;
  document.getElementById('sum-low').textContent   = low;
  document.getElementById('sum-empty').textContent = empty;
}

function updateLastUpdated() {
  const el = document.getElementById('last-updated');
  if (lastUpdated) {
    const d = new Date(lastUpdated);
    el.textContent = 'Senast uppdaterat: ' + d.toLocaleString('sv-SE');
  } else {
    el.textContent = '';
  }
}
</script>
</body>
</html>
